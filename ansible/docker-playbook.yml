---
- name: Provision x86 with Docker Engine (rootless)
  hosts: acer
  become: true
  vars:
    backup_path: ""
    ansible_user: "{{ ansible_user }}"
    docker_packages_purge:
      - docker.io
      - docker-compose 
      - docker-compose-v2 
      - docker-doc 
      - podman-docker 
      - containerd 
      - runc
    docker_packages_install:
      - ca-certificates
      - curl
      - docker-ce 
      - docker-ce-cli 
      - containerd.io     
      - docker-buildx-plugin 
      - docker-compose-plugin
    rootless_deps:
      - uidmap
      - gnupg
    
  tasks:

    - name: Remove existing Docker-related packages
      ansible.builtin.apt:
        name: "{{ docker_packages_purge }}"
        state: absent
        purge: yes
        autoremove: yes

    - name: Remove Docker-related leftover directories from uninstall
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/docker
        - /var/lib/containerd

    - name: Install rootless dependencies
      ansible.builtin.apt:
        name: "{{ rootless_deps }}"
        state: present
        update_cache: yes
    
    - name: Add Docker official GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker APT repository (amd64)
      ansible.builtin.apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu "{{ ansible_distribution_release }}" stable 
        state: present
        update_cache: yes

    - name: Install Docker Engine + packages
      ansible.builtin.apt:
        name: "{{ docker_packages_install }}"
        state: present

    - name: Stop Docker services (if any)
      ansible.builtin.systemd_service:
        name: 
          - docker.service
          - docker.socket
        state: stopped
        enabled: no

    - name: Remove Docker socket
      ansible.builtin.command:
        cmd: rm /var/run/docker.sock
      become: true
      become_user: "{{ ansible_user }}"

    
    - name: Run dockerd-rootless-setuptool.sh as target user
      ansible.builtin.command:
        cmd: dockerd-rootless-setuptool.sh install 
      become: true
      
    - name: Export to PATH, set DOCKER_HOST  
      ansible.builtin.command:
        cmd: 
        - export PATH=/usr/bin:$PATH
        - export DOCKER_HOST=unix:///run/user/1000/docker.sock
    
    - name: Verify Docker rootless context
      ansible.builtin.command:
        cmd: docker info | grep Context
      
      
